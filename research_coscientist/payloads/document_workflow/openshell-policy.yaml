version: 1

network_policies:
  dns_resolution:
    name: dns-resolution
    endpoints:
      - host: 1.1.1.1
        port: 53
        allowed_ips:
          - 1.1.1.1/32
      - host: 8.8.8.8
        port: 53
        allowed_ips:
          - 8.8.8.8/32
    binaries:
      - path: /usr/local/bin/python3
      - path: /usr/bin/w3m
  public_http_research:
    name: public-http-research
    endpoints:
      - host: "*"
        port: 80
      - host: "*"
        port: 443
    binaries:
      - path: /usr/local/bin/python3
      - path: /usr/bin/w3m
  docker_model_runner:
    name: docker-model-runner
    endpoints:
      - host: model-runner.docker.internal
        port: 80
        allowed_ips:
          - 192.168.65.0/24
    binaries:
      - path: /usr/local/bin/python3
