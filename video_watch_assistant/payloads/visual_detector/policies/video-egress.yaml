version: 1

network_policies:
  mapped_local_rtsp_stream_loopback:
    name: mapped-local-rtsp-stream-loopback
    endpoints:
      - host: 127.0.0.1
        port: 8554
        allowed_ips:
          - 127.0.0.1/32
    binaries:
      - path: /usr/bin/ffmpeg
      - path: /usr/bin/python3
  mapped_local_rtsp_stream_localhost:
    name: mapped-local-rtsp-stream-localhost
    endpoints:
      - host: localhost
        port: 8554
        allowed_ips:
          - 127.0.0.1/32
    binaries:
      - path: /usr/bin/ffmpeg
      - path: /usr/bin/python3
  mapped_local_rtsp_stream_openshell_host:
    name: mapped-local-rtsp-stream-openshell-host
    endpoints:
      - host: host.openshell.internal
        port: 8554
        allowed_ips:
          - 127.0.0.1/32
          - 192.168.65.254/32
    binaries:
      - path: /usr/bin/ffmpeg
      - path: /usr/bin/python3
  mapped_local_rtsp_stream_docker_host:
    name: mapped-local-rtsp-stream-docker-host
    endpoints:
      - host: host.docker.internal
        port: 8554
        allowed_ips:
          - 192.168.65.254/32
          - 127.0.0.1/32
    binaries:
      - path: /usr/bin/ffmpeg
      - path: /usr/bin/python3
  mapped_local_rtsp_stream_gateway:
    name: mapped-local-rtsp-stream-gateway
    endpoints:
      - host: 192.168.65.254
        port: 8554
        allowed_ips:
          - 192.168.65.254/32
    binaries:
      - path: /usr/bin/ffmpeg
      - path: /usr/bin/python3
  local_vl_model:
    name: local-vl-model
    endpoints:
      - host: 192.168.4.173
        port: 11434
        allowed_ips:
          - 192.168.4.173/32
    binaries:
      - path: /bin/bash
      - path: /usr/bin/bash
      - path: /usr/bin/python3
      - path: /usr/bin/python3.12
