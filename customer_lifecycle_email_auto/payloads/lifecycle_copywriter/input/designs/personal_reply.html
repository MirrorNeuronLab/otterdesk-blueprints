<html>
  <body style="margin:0;padding:0;background-color:#ffffff;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{preheader}}</div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#ffffff;">
      <tr>
        <td align="left" style="padding:24px 18px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;">
            <tr>
              <td style="font-family:Arial,sans-serif;color:{{text_color}};font-size:16px;line-height:1.65;">
                {{#body_sections}}<p data-slot="body_section" style="margin:0 0 14px;color:{{text_color}};">{{body_section}}</p>{{/body_sections}}
                <p style="margin:18px 0 0;color:{{text_color}};">{{signature}}</p>
                <p data-slot="secondary_text" style="margin:18px 0 0;font-size:14px;line-height:1.55;color:#6b7280;">{{secondary_text}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
